name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: test:ci-token
      ADMIN_TELEGRAM_ID: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Tests
        run: npm test

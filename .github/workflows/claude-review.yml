name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set, skipping review"
            exit 0
          fi

          git diff origin/${{ github.base_ref }}...HEAD > /tmp/diff.txt

          DIFF_SIZE=$(wc -c < /tmp/diff.txt)
          if [ "$DIFF_SIZE" -lt 10 ]; then
            echo "No meaningful changes to review"
            exit 0
          fi

          # Truncate very large diffs to stay within context
          head -c 100000 /tmp/diff.txt > /tmp/diff-trimmed.txt

          cat <<'PROMPT' > /tmp/review-prompt.txt
          You are a code reviewer for Hunter — a TypeScript/Node.js Telegram bot (grammY, SQLite, Vitest).
          Review the git diff below. Focus on:
          - Bugs and logic errors
          - Security vulnerabilities
          - Missing error handling for critical paths
          - Breaking changes

          Skip: style, formatting, naming, comments.
          Be concise. Reference file:line. Bullet list.
          If no issues: just say "LGTM"

          ---
          PROMPT

          cat /tmp/diff-trimmed.txt >> /tmp/review-prompt.txt

          REVIEW=$(claude --print --model claude-sonnet-4-6 < /tmp/review-prompt.txt 2>&1) || true

          if [ -z "$REVIEW" ]; then
            echo "Claude returned empty review, skipping"
            exit 0
          fi

          gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<EOF
          ## Claude Code Review

          $REVIEW

          ---
          _Automated review by Claude Sonnet 4.6_
          EOF
          )"

// === Markdown parser for Hunter BACKLOG.md format ===

function parseBacklogMd(md) {
  const lines = md.split('\n');
  const done = { version: '', date: '', items: [] };
  const sprints = [];
  let section = null;
  let currentSprint = null;
  let currentGroup = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Done section: ## Сделано (v0.1.0 — 12.03.2026)
    const doneMatch = line.match(/^## Сделано\s*\((v[\d.]+)\s*[—\-]\s*(.+?)\)/);
    if (doneMatch) {
      done.version = doneMatch[1];
      done.date = doneMatch[2];
      section = 'done';
      continue;
    }

    // Sprint: ## SPRINT 1 — Name
    const sprintMatch = line.match(/^## SPRINT (\d+) — (.+)/);
    if (sprintMatch) {
      section = 'sprint';
      currentSprint = {
        number: parseInt(sprintMatch[1]),
        name: sprintMatch[2].trim(),
        status: 'active',
        groups: []
      };
      sprints.push(currentSprint);
      currentGroup = null;
      continue;
    }

    // Priority group: ### P0: Name  or  ### P0-1: Name (subgroups)
    const groupMatch = line.match(/^### (P\d)(?:-\d+)?:\s*(.+)/);
    if (groupMatch && currentSprint) {
      currentGroup = {
        priority: groupMatch[1].toLowerCase(),
        title: groupMatch[2].trim(),
        tasks: []
      };
      currentSprint.groups.push(currentGroup);
      continue;
    }

    // Separator resets section
    if (/^---\s*$/.test(line)) {
      if (section === 'done') section = null;
      currentGroup = null;
      continue;
    }

    // Metadata section
    if (/^## Метаданные/.test(line)) {
      section = 'metadata';
      continue;
    }

    // Task: - [x] or - [ ] with optional **bold** — detail
    const taskMatch = line.match(/^- \[([ x])\]\s+(.+)/);
    if (taskMatch) {
      const isDone = taskMatch[1] === 'x';
      let raw = taskMatch[2].trim();

      if (section === 'done') {
        // Strip markdown bold
        raw = raw.replace(/\*\*/g, '');
        done.items.push(raw);
        continue;
      }

      if (currentGroup) {
        let text = raw;
        let detail = '';
        const boldMatch = raw.match(/^\*\*(.+?)\*\*\s*[—\-]\s*(.*)/);
        if (boldMatch) {
          text = boldMatch[1];
          detail = boldMatch[2] || '';
        } else {
          const plainBold = raw.match(/^\*\*(.+?)\*\*/);
          if (plainBold) text = plainBold[1];
        }
        const task = { text, done: isDone };
        if (detail) task.detail = detail;
        currentGroup.tasks.push(task);
      }
      continue;
    }
  }

  return { done, sprints };
}

  model: 'Claude Sonnet 4.6'
};

const servicesData = [
  { name: 'Railway', purpose: 'Хостинг 24/7 (план)', cost: '~$5/мес', paid: true },

// === Fetch from GitHub or use embedded ===

async function loadBacklog() {
  if (GITHUB_RAW_URL) {
    try {
      const res = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error(res.status);
      const md = await res.text();
      const parsed = parseBacklogMd(md);
      localStorage.setItem('hunter_backlog', JSON.stringify(parsed));
      localStorage.setItem('hunter_backlog_ts', Date.now().toString());
      return parsed;
    } catch (err) {
      console.warn('[backlog] fetch failed, trying cache:', err);
      const cached = localStorage.getItem('hunter_backlog');
      if (cached) return JSON.parse(cached);
    }
  }
  return parseBacklogMd(BACKLOG_MD);
}

// === Renderers ===

const priorityColors = { p0: 'var(--p0)', p1: 'var(--p1)', p2: 'var(--p2)', p3: 'var(--p3)' };
const priorityLabels = { p0: 'P0 Critical', p1: 'P1 Important', p2: 'P2 Nice to have', p3: 'P3 Future' };

function countTasks(sprints) {
  let total = 0, done = 0;
  const byPriority = { p0: 0, p1: 0, p2: 0, p3: 0 };
  for (const s of sprints) {
    for (const g of s.groups) {
      for (const t of g.tasks) {
        total++;
        if (t.done) done++;
        if (!t.done) byPriority[g.priority] = (byPriority[g.priority] || 0) + 1;
      }
    }
  }
  return { total, done, todo: total - done, byPriority };
}

function renderStats(doneItems, sprints) {
  const counts = countTasks(sprints);
  const totalDone = doneItems.length + counts.done;
  const totalAll = totalDone + counts.todo;

  const items = [
    { value: totalAll, label: 'Всего', color: 'var(--text)' },
    { value: totalDone, label: 'Сделано', color: 'var(--done)' },
    { value: counts.byPriority.p0 || 0, label: 'P0', color: 'var(--p0)' },
    { value: counts.byPriority.p1 || 0, label: 'P1', color: 'var(--p1)' },
    { value: counts.byPriority.p2 + counts.byPriority.p3, label: 'P2+P3', color: 'var(--p2)' },
  ];

  document.getElementById('stats').innerHTML = items.map(s =>
    `<div class="stat">
      <div class="stat-value" style="color:${s.color}">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>`
  ).join('');
}

function renderAgent() {
  const a = agentData;
  document.getElementById('agent').innerHTML = `
    <div class="section-label">Agents</div>
    <div class="agent-card">
      <div class="agent-header">
        <div class="agent-icon">${a.icon}</div>
        <div>
          <div class="agent-name">${a.name}</div>
          <div class="agent-meta">${a.platform} &middot; ${a.model}</div>
        </div>
      </div>
      <div class="agent-status">
        <span class="agent-status-dot"></span>
        ${a.schedule}
      </div>
      <div class="agent-skills">
        ${a.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
      </div>
    </div>
  `;
}

function renderDone(done) {
  if (!done.items.length) return '';
  return `
    <div class="section done-section collapsed">
      <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div>
          <span class="section-title">${done.version} — ${done.date}</span>
          <span class="section-badge badge-done">deployed</span>
        </div>
        <span class="collapse-icon">&#x25BC;</span>
      </div>
      <div class="section-body">
        ${done.items.map(item => `<div class="release-item">${esc(item)}</div>`).join('')}
      </div>
    </div>
  `;
}

function renderSprint(sprint) {
  const allTasks = sprint.groups.flatMap(g => g.tasks);
  const doneCount = allTasks.filter(t => t.done).length;
  const total = allTasks.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;
  const badgeClass = sprint.status === 'active' ? 'badge-active' : 'badge-planned';
  const badgeText = sprint.status === 'active' ? 'active' : 'planned';

  return `
    <div class="section">
      <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div>
          <span class="section-title">Sprint ${sprint.number} — ${esc(sprint.name)}</span>
          <span class="section-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;color:var(--text-muted)">${doneCount}/${total}</span>
          <span class="collapse-icon">&#x25BC;</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="section-body">
        ${sprint.groups.map(renderGroup).join('')}
      </div>
    </div>
  `;
}

function renderGroup(group) {
  const color = priorityColors[group.priority] || 'var(--text-muted)';
  return `
    <div class="group">
      <div class="group-title">
        <span class="priority-dot" style="background:${color}"></span>
        ${esc(group.priority.toUpperCase())}: ${esc(group.title)}
      </div>
      ${group.tasks.map(renderTask).join('')}
    </div>
  `;
}

function renderTask(task) {
  const doneClass = task.done ? 'task-done' : '';
  const hasDetail = task.detail ? 'has-detail' : '';
  const clickHandler = task.detail ? 'onclick="toggleDetail(this)"' : '';

  return `
    <div class="task ${doneClass} ${hasDetail}" ${clickHandler}>
      <div class="task-check"></div>
      <div class="task-content">
        <div class="task-row">
          <span class="task-text"><strong>${esc(task.text)}</strong></span>
          ${task.detail ? '<span class="expand-icon">&#x25B6;</span>' : ''}
        </div>
        ${task.detail ? `<div class="task-detail">${esc(task.detail)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderInfoPanel() {
  const metaRows = metaData.map(m =>
    `<tr><td>${esc(m.key)}</td><td>${esc(m.value)}</td></tr>`
  ).join('');

  const serviceRows = servicesData.map(s =>
    `<tr><td>${esc(s.name)}</td><td>${esc(s.purpose)}</td><td class="cost ${s.paid ? 'paid' : ''}">${esc(s.cost)}</td></tr>`
  ).join('');

  document.getElementById('infopanel').innerHTML = `
    <div class="info-tables">
      <div class="info-table">
        <div class="info-table-title">Project</div>
        <table>${metaRows}</table>
      </div>
      <div class="info-table">
        <div class="info-table-title">Services</div>
        <table>${serviceRows}</table>
      </div>
    </div>
  `;
}

// === Helpers ===

function esc(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function toggleDetail(el) {
  el.classList.toggle('expanded');
  const detail = el.querySelector('.task-detail');
  if (detail) detail.classList.toggle('open');
}

// === Main ===

async function main() {
  const data = await loadBacklog();
  if (!data) {
    document.getElementById('content').innerHTML = '<p style="color:var(--text-muted)">Failed to load backlog</p>';
    return;
  }

  // Last update
  const ts = localStorage.getItem('hunter_backlog_ts');
  const updateText = GITHUB_RAW_URL && ts
    ? `Updated ${new Date(parseInt(ts)).toLocaleString('ru-RU')}`
    : 'Embedded data';
  document.getElementById('lastUpdate').textContent = updateText;

  // Render
  renderStats(data.done.items, data.sprints);
  renderInfoPanel();
  renderAgent();

  let html = '';
  html += '<div class="section-label">Releases</div>';
  html += renderDone(data.done);
  html += '<div class="section-label">Sprints</div>';
  html += data.sprints.map(renderSprint).join('');
  document.getElementById('content').innerHTML = html;
}

main();
</script>
